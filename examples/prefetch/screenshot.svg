<svg xmlns="http://www.w3.org/2000/svg" width="400" height="760" viewBox="0 0 400 760" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="400" height="760" rx="22" fill="#0B0B10"/>
  <clipPath id="cl"><rect width="400" height="760" rx="22"/></clipPath>
  <g clip-path="url(#cl)">
    <text x="20" y="46" fill="#fff" font-size="26" font-weight="700">Eager Loading</text>
    <text x="20" y="66" fill="#8A8A93" font-size="12">Load a one-to-many without the N+1 problem</text>

    <!-- query-count card (efficient = green) -->
    <rect x="16" y="82" width="368" height="132" rx="18" fill="#12241A" stroke="#30D158"/>
    <text x="200" y="150" fill="#30D158" font-size="52" font-weight="700" text-anchor="middle">2</text>
    <text x="200" y="170" fill="#8A8A93" font-size="12" font-weight="700" text-anchor="middle">SQL QUERIES</text>
    <text x="200" y="194" fill="#C8C8CE" font-size="13" text-anchor="middle">Prefetch  (2 queries)  ·  0.71 ms</text>

    <!-- buttons -->
    <rect x="60" y="228" width="150" height="44" rx="22" fill="#3A2226" stroke="#FF453A"/>
    <text x="135" y="255" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">Load N+1</text>
    <rect x="222" y="228" width="150" height="44" rx="22" fill="#30D158"/>
    <text x="297" y="255" fill="#0B0B10" font-size="14" font-weight="700" text-anchor="middle">Load prefetch</text>

    <!-- authors + book chips -->
    <g font-family="-apple-system, Helvetica, Arial, sans-serif">
      <!-- Ada -->
      <rect x="14" y="290" width="372" height="66" rx="14" fill="#16161D"/>
      <text x="30" y="316" fill="#fff" font-size="16" font-weight="700">Ada</text>
      <rect x="330" y="300" width="46" height="22" rx="11" fill="#26262E"/><text x="353" y="315" fill="#0A84FF" font-size="11" font-weight="700" text-anchor="middle">1 book</text>
      <rect x="30" y="330" width="72" height="20" rx="10" fill="#20202A"/><text x="66" y="344" fill="#B0B0B8" font-size="10" text-anchor="middle">Ada vol.1</text>

      <!-- Alan -->
      <rect x="14" y="364" width="372" height="66" rx="14" fill="#16161D"/>
      <text x="30" y="390" fill="#fff" font-size="16" font-weight="700">Alan</text>
      <rect x="326" y="374" width="50" height="22" rx="11" fill="#26262E"/><text x="351" y="389" fill="#0A84FF" font-size="11" font-weight="700" text-anchor="middle">2 books</text>
      <rect x="30" y="404" width="76" height="20" rx="10" fill="#20202A"/><text x="68" y="418" fill="#B0B0B8" font-size="10" text-anchor="middle">Alan vol.1</text>
      <rect x="112" y="404" width="76" height="20" rx="10" fill="#20202A"/><text x="150" y="418" fill="#B0B0B8" font-size="10" text-anchor="middle">Alan vol.2</text>

      <!-- Grace -->
      <rect x="14" y="438" width="372" height="66" rx="14" fill="#16161D"/>
      <text x="30" y="464" fill="#fff" font-size="16" font-weight="700">Grace</text>
      <rect x="326" y="448" width="50" height="22" rx="11" fill="#26262E"/><text x="351" y="463" fill="#0A84FF" font-size="11" font-weight="700" text-anchor="middle">3 books</text>
      <rect x="30" y="478" width="84" height="20" rx="10" fill="#20202A"/><text x="72" y="492" fill="#B0B0B8" font-size="10" text-anchor="middle">Grace vol.1</text>
      <rect x="120" y="478" width="84" height="20" rx="10" fill="#20202A"/><text x="162" y="492" fill="#B0B0B8" font-size="10" text-anchor="middle">Grace vol.2</text>
      <rect x="210" y="478" width="84" height="20" rx="10" fill="#20202A"/><text x="252" y="492" fill="#B0B0B8" font-size="10" text-anchor="middle">Grace vol.3</text>

      <!-- Ken -->
      <rect x="14" y="512" width="372" height="66" rx="14" fill="#16161D"/>
      <text x="30" y="538" fill="#fff" font-size="16" font-weight="700">Ken</text>
      <rect x="326" y="522" width="50" height="22" rx="11" fill="#26262E"/><text x="351" y="537" fill="#0A84FF" font-size="11" font-weight="700" text-anchor="middle">4 books</text>
      <rect x="30" y="552" width="72" height="20" rx="10" fill="#20202A"/><text x="66" y="566" fill="#B0B0B8" font-size="10" text-anchor="middle">Ken vol.1</text>
      <rect x="108" y="552" width="72" height="20" rx="10" fill="#20202A"/><text x="144" y="566" fill="#B0B0B8" font-size="10" text-anchor="middle">Ken vol.2</text>
      <rect x="186" y="552" width="72" height="20" rx="10" fill="#20202A"/><text x="222" y="566" fill="#B0B0B8" font-size="10" text-anchor="middle">Ken vol.3</text>
      <rect x="264" y="552" width="72" height="20" rx="10" fill="#20202A"/><text x="300" y="566" fill="#B0B0B8" font-size="10" text-anchor="middle">Ken vol.4</text>

      <!-- Linus -->
      <rect x="14" y="586" width="372" height="66" rx="14" fill="#16161D"/>
      <text x="30" y="612" fill="#fff" font-size="16" font-weight="700">Linus</text>
      <rect x="326" y="596" width="50" height="22" rx="11" fill="#26262E"/><text x="351" y="611" fill="#0A84FF" font-size="11" font-weight="700" text-anchor="middle">5 books</text>
      <rect x="30" y="626" width="82" height="20" rx="10" fill="#20202A"/><text x="71" y="640" fill="#B0B0B8" font-size="10" text-anchor="middle">Linus vol.1</text>
      <rect x="118" y="626" width="82" height="20" rx="10" fill="#20202A"/><text x="159" y="640" fill="#B0B0B8" font-size="10" text-anchor="middle">Linus vol.2</text>
      <rect x="206" y="626" width="82" height="20" rx="10" fill="#20202A"/><text x="247" y="640" fill="#B0B0B8" font-size="10" text-anchor="middle">Linus vol.3</text>
    </g>

    <!-- tip: red state -->
    <rect x="14" y="672" width="372" height="60" rx="14" fill="#241216" stroke="#FF453A" stroke-opacity="0.5"/>
    <text x="200" y="698" fill="#FF453A" font-size="13" font-weight="700" text-anchor="middle">Tap “Load N+1” → 31 queries</text>
    <text x="200" y="718" fill="#8A8A93" font-size="11" text-anchor="middle">same data, one query per author</text>
  </g>
</svg>

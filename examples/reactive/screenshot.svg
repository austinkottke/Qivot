<svg xmlns="http://www.w3.org/2000/svg" width="440" height="500" viewBox="0 0 440 500" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="440" height="500" fill="#F2F2F2"/>

  <text x="16" y="42" fill="#111" font-size="24" font-weight="700">Tasks (5)</text>

  <!-- add row -->
  <rect x="16" y="60" width="320" height="34" rx="6" fill="#fff" stroke="#C9C9CE"/>
  <text x="28" y="82" fill="#9A9AA0" font-size="14">New task…</text>
  <rect x="344" y="60" width="80" height="34" rx="6" fill="#007AFF"/>
  <text x="384" y="82" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Add</text>

  <!-- auto checkbox -->
  <rect x="16" y="104" width="16" height="16" rx="3" fill="#fff" stroke="#B4B4BA"/>
  <text x="40" y="117" fill="#333" font-size="13">Auto-add a task every 2s — watch the list grow by itself</text>

  <!-- list frame -->
  <rect x="16" y="132" width="408" height="352" rx="8" fill="#fff" stroke="#D6D6DB"/>

  <!-- rows -->
  <g font-size="15" fill="#111">
    <rect x="30" y="148" width="18" height="18" rx="4" fill="#007AFF"/>
    <path d="M34 157 l3 3 l6 -7" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="58" y="162" fill="#9A9AA0" text-decoration="line-through">heartbeat 09:41:07</text>
    <text x="408" y="162" fill="#C0C0C5" text-anchor="end">✕</text>

    <rect x="30" y="184" width="18" height="18" rx="4" fill="#fff" stroke="#B4B4BA"/>
    <text x="58" y="198">Buy groceries</text>
    <text x="408" y="198" fill="#C0C0C5" text-anchor="end">✕</text>

    <rect x="30" y="220" width="18" height="18" rx="4" fill="#fff" stroke="#B4B4BA"/>
    <text x="58" y="234">Ship the Qivot 1.0 release</text>
    <text x="408" y="234" fill="#C0C0C5" text-anchor="end">✕</text>

    <rect x="30" y="256" width="18" height="18" rx="4" fill="#007AFF"/>
    <path d="M34 265 l3 3 l6 -7" stroke="#fff" stroke-width="2" fill="none"/>
    <text x="58" y="270" fill="#9A9AA0" text-decoration="line-through">Write the tutorial</text>
    <text x="408" y="270" fill="#C0C0C5" text-anchor="end">✕</text>

    <rect x="30" y="292" width="18" height="18" rx="4" fill="#fff" stroke="#B4B4BA"/>
    <text x="58" y="306">Call the dentist</text>
    <text x="408" y="306" fill="#C0C0C5" text-anchor="end">✕</text>
  </g>
</svg>

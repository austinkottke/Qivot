    <text x="34" y="292" fill="#fff" font-size="30" font-weight="700">Cosmic Drift</text>
    <rect x="34" y="304" width="96" height="26" rx="13" fill="#FFFFFF" opacity="0.20"/>
    <text x="48" y="322" fill="#fff" font-size="13" font-weight="700">✦  4,823</text>

    <rect x="16" y="342" width="398" height="208" rx="24" fill="url(#c2)"/>
    <circle cx="90" cy="500" r="60" fill="#FFFFFF" opacity="0.12"/>
    <rect x="32" y="358" width="82" height="22" rx="11" fill="#FFFFFF" opacity="0.30"/>
    <text x="50" y="373" fill="#fff" font-size="12" font-weight="700">Gradient</text>
    <text x="390" y="374" fill="#fff" font-size="13" font-weight="700" text-anchor="end" opacity="0.9">#2</text>
    <text x="34" y="516" fill="#fff" font-size="30" font-weight="700">Neon Bloom</text>
    <rect x="34" y="528" width="96" height="26" rx="13" fill="#FFFFFF" opacity="0.20"/>

<svg xmlns="http://www.w3.org/2000/svg" width="430" height="820" viewBox="0 0 430 820" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="c1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6CAB"/><stop offset="1" stop-color="#7366FF"/></linearGradient>
    <linearGradient id="c2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#42E695"/><stop offset="1" stop-color="#3BB2B8"/></linearGradient>
    <linearGradient id="c3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FDBB2D"/><stop offset="1" stop-color="#22C1C3"/></linearGradient>
    <linearGradient id="c4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FC466B"/><stop offset="1" stop-color="#3F5EFB"/></linearGradient>
  </defs>

  <rect width="430" height="820" fill="#08080B"/>

  <!-- cards -->
  <g>
    <rect x="16" y="118" width="398" height="208" rx="24" fill="url(#c1)"/>
    <circle cx="330" cy="170" r="52" fill="#FFFFFF" opacity="0.14"/>
    <rect x="32" y="134" width="86" height="22" rx="11" fill="#FFFFFF" opacity="0.30"/>

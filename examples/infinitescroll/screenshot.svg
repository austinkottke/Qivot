    <circle cx="340" cy="620" r="48" fill="#FFFFFF" opacity="0.14"/>
    <rect x="32" y="582" width="76" height="22" rx="11" fill="#FFFFFF" opacity="0.30"/>
    <text x="50" y="597" fill="#fff" font-size="12" font-weight="700">Nebula</text>
    <text x="390" y="598" fill="#fff" font-size="13" font-weight="700" text-anchor="end" opacity="0.9">#3</text>
    <text x="34" y="740" fill="#fff" font-size="30" font-weight="700">Velvet Pulse</text>

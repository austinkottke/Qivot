  <text x="18" y="70" fill="#fff" font-size="32" font-weight="700">Discover</text>
  <text x="18" y="90" fill="#8A8A93" font-size="13">Infinite feed · streamed from SQLite, 24 at a time</text>
  <rect x="300" y="60" width="114" height="30" rx="15" fill="#FFFFFF" opacity="0.11"/>
  <text x="357" y="80" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">◆  72 loaded</text>

  <!-- toast -->
  <rect x="163" y="116" width="104" height="34" rx="17" fill="#202028" stroke="#FFFFFF" stroke-opacity="0.13"/>
  <text x="215" y="138" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">＋24 loaded</text>

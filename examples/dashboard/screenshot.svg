<svg xmlns="http://www.w3.org/2000/svg" width="400" height="820" viewBox="0 0 400 820" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="400" height="820" rx="22" fill="#0B0B10"/>
  <clipPath id="cl"><rect width="400" height="820" rx="22"/></clipPath>
  <g clip-path="url(#cl)">
    <text x="20" y="46" fill="#fff" font-size="26" font-weight="700">Query Playground</text>
    <text x="20" y="66" fill="#8A8A93" font-size="12">One small query per step — code and live result</text>

    <!-- a recipe card renderer via repeated groups -->
    <!-- step 1 -->
    <g transform="translate(16,86)">
      <rect width="368" height="112" rx="16" fill="#16161D"/>
      <circle cx="30" cy="28" r="14" fill="#0A84FF"/><text x="30" y="33" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">1</text>
      <text x="54" y="33" fill="#fff" font-size="15" font-weight="700">Count every row</text>
      <rect x="16" y="46" width="336" height="30" rx="8" fill="#0C0C12" stroke="#20202A"/>
      <text x="26" y="66" fill="#79C0FF" font-size="11.5" font-family="Menlo, monospace">Sale::objects().count()</text>
      <text x="16" y="98" fill="#30D158" font-size="14" font-weight="700">→  600 sales</text>
    </g>

    <!-- step 2 -->
    <g transform="translate(16,210)">
      <rect width="368" height="112" rx="16" fill="#16161D"/>
      <circle cx="30" cy="28" r="14" fill="#0A84FF"/><text x="30" y="33" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">2</text>
      <text x="54" y="33" fill="#fff" font-size="15" font-weight="700">Sum with an aggregate</text>
      <rect x="16" y="46" width="336" height="30" rx="8" fill="#0C0C12" stroke="#20202A"/>
      <text x="26" y="66" fill="#79C0FF" font-size="11.5" font-family="Menlo, monospace">Sale::objects().call("sum", "amount")</text>
      <text x="16" y="98" fill="#30D158" font-size="14" font-weight="700">→  $312,950 total revenue</text>
    </g>

    <!-- step 4 (filter) -->
    <g transform="translate(16,334)">
      <rect width="368" height="112" rx="16" fill="#16161D"/>
      <circle cx="30" cy="28" r="14" fill="#0A84FF"/><text x="30" y="33" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">4</text>
      <text x="54" y="33" fill="#fff" font-size="15" font-weight="700">Filter with a typed condition</text>
      <rect x="16" y="46" width="336" height="30" rx="8" fill="#0C0C12" stroke="#20202A"/>
      <text x="26" y="66" fill="#79C0FF" font-size="11" font-family="Menlo, monospace">Sale::objects().filter(col().amount &gt; 900).count()</text>
      <text x="16" y="98" fill="#30D158" font-size="14" font-weight="700">→  62 sales over $900</text>
    </g>

    <!-- step 7 (window) -->
    <g transform="translate(16,458)">
      <rect width="368" height="112" rx="16" fill="#16161D"/>
      <circle cx="30" cy="28" r="14" fill="#0A84FF"/><text x="30" y="33" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">7</text>
      <text x="54" y="33" fill="#fff" font-size="14" font-weight="700">Rank with a window function</text>
      <rect x="16" y="46" width="336" height="30" rx="8" fill="#0C0C12" stroke="#20202A"/>
      <text x="26" y="66" fill="#79C0FF" font-size="10.5" font-family="Menlo, monospace">qiRawQuery&lt;LeaderRow&gt;("… RANK() OVER (…) …")</text>
      <text x="16" y="98" fill="#30D158" font-size="14" font-weight="700">→  #1  Ken Thompson — $39,425</text>
    </g>

    <!-- step 8 (async) -->
    <g transform="translate(16,582)">
      <rect width="368" height="120" rx="16" fill="#16161D"/>
      <circle cx="30" cy="28" r="14" fill="#0A84FF"/><text x="30" y="33" fill="#fff" font-size="14" font-weight="700" text-anchor="middle">8</text>
      <text x="54" y="33" fill="#fff" font-size="15" font-weight="700">Run a query off the UI thread</text>
      <rect x="16" y="46" width="336" height="30" rx="8" fill="#0C0C12" stroke="#20202A"/>
      <text x="26" y="66" fill="#79C0FF" font-size="10" font-family="Menlo, monospace">QiAsync::run([](QiConnection &amp;c){ return …count(); })</text>
      <rect x="16" y="86" width="92" height="34" rx="17" fill="#0A84FF"/>
      <text x="62" y="108" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">Run</text>
      <text x="122" y="108" fill="#30D158" font-size="13" font-weight="700">600 sales (on a worker thread)</text>
    </g>

    <text x="200" y="736" fill="#5A5A62" font-size="11" text-anchor="middle">steps 3, 5, 6 continue below · scroll for more</text>
  </g>
</svg>
